services:
  postgres_db:
    image: postgres:17
    container_name: ghenesis_db
    restart: always
    environment:
      POSTGRES_USER: joseabanto
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: ghenesis
    ports:
      - "5433:5432" # Puerto 5433 en tu Mac mapea al 5432 dentro del contenedor
    volumes:
      - ./postgres_data:/var/lib/postgresql/data # Persistencia de datos en carpeta local

  backend:
    build:
      context: ./backend
    container_name: ghenesis_backend
    restart: always
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=joseabanto
      - DB_PASSWORD=mysecretpassword
      - DB_NAME=ghenesis
      - PORT=3000
      - JWT_SECRET=ghenesis_ultra_secret_key_2026
      # Credenciales para envio de correos usando Gmail
      - GMAIL_USER=joseabantomarin@gmail.com
      - GMAIL_APP_PASSWORD=fhbaoqxmzjdneuwj
      - SMTP_FROM_NAME=Soporte Ghenesis
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - postgres_db

  frontend:
    build:
      context: ./frontend
      target: build
    container_name: ghenesis_frontend
    restart: always
    environment:
      - BACKEND_URL=http://backend:3000
    ports:
      - "8077:5173" # Vite dev server corre en 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:
